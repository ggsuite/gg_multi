name: kidney_core
description: Das Herzstück der Kidney Suite. Fungiert als Backend und CMD-Line Tool.
version: 1.0.0
repository: https://github.com/inlavigo/kidney_core.git
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  path: ^1.8.0
  args: ^2.7.0
  gg: #^3.1.0
    path: ../gg
  gg_console_colors: ^2.1.4
  gg_process: ^1.1.6
  gg_args: ^2.0.4
  gg_log: ^1.0.6
  mocktail: ^1.0.4
  http: ^1.3.0
  pubspec_parse: ^1.5.0
  gg_changelog: ^1.0.12
  interact: ^2.2.0
  recase: ^4.1.0
  gg_localize_refs:
    git:
      url: git@github.com:ggsuite/gg_localize_refs.git
      ref: get_set_ref_version
  gg_local_package_dependencies:
    git: git@github.com:ggsuite/gg_local_package_dependencies.git

dev_dependencies:
  gg_capture_print: ^1.0.9
  lints: ^5.0.0
  test: ^1.24.0

executables:
 kidney_core: